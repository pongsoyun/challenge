<html lang="ko">
<head>

  <title>🇯🇵 일본어 여행회화 퀴즈</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --border: #e5e5ea;
      --text: #1c1c1e;
      --sub: #8e8e93;
      --o: #34c759;
      --x: #ff3b30;
      --accent: #007aff;
      --reveal-bg: #f2f2f7;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
    }
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(245,245,247,0.92);
      backdrop-filter: blur(12px);
      padding: 12px 16px 0;
      border-bottom: 1px solid var(--border);
    }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    h1 { font-size: 17px; font-weight: 700; }
    .mode-toggle { display: flex; background: var(--border); border-radius: 8px; padding: 2px; }
    .mode-btn { padding: 5px 14px; border: none; background: transparent; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--sub); transition: all .2s; }
    .mode-btn.active { background: var(--card); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.12); }
    .stats-bar { display: flex; gap: 10px; align-items: center; font-size: 13px; padding-bottom: 8px; }
    .stat { display: flex; align-items: center; gap: 3px; font-weight: 700; }
    .stat.o { color: var(--o); }
    .stat.x { color: var(--x); }
    .stat.total { color: var(--sub); font-weight: 500; }
    .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 1px; }
    .progress-fill { height: 100%; background: var(--o); border-radius: 2px; transition: width .4s; }
    .filter-row { display: flex; gap: 6px; overflow-x: auto; padding: 10px 16px; scrollbar-width: none; }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-btn { padding: 5px 13px; border: 1.5px solid var(--border); border-radius: 20px; background: var(--card); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; color: var(--sub); transition: all .2s; }
    .filter-btn.active { background: var(--text); border-color: var(--text); color: #fff; }
    .filter-btn.review-btn.active { background: var(--x); border-color: var(--x); }
    .cards { padding: 4px 16px 120px; display: flex; flex-direction: column; gap: 8px; }
    .cat-header { font-size: 12px; font-weight: 700; color: var(--sub); padding: 14px 0 2px; letter-spacing: .4px; }
    .card { background: var(--card); border-radius: 14px; padding: 13px 12px; display: flex; align-items: flex-start; gap: 10px; border: 1.5px solid transparent; transition: border-color .2s, background .2s; }
    .card.status-o { border-color: var(--o); background: #f0fdf4; }
    .card.status-x { border-color: var(--x); background: #fff5f5; }
    .ox-wrap { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; padding-top: 2px; }
    .ox-btn { width: 34px; height: 34px; border-radius: 9px; border: 2px solid var(--border); background: #fff; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; -webkit-tap-highlight-color: transparent; }
    .ox-btn.o-btn.selected { background: var(--o); border-color: var(--o); }
    .ox-btn.x-btn.selected { background: var(--x); border-color: var(--x); }
    .card-content { flex: 1; min-width: 0; }
    .card-num { font-size: 10px; color: var(--sub); font-weight: 600; margin-bottom: 4px; }
    .question { font-size: 16px; font-weight: 600; line-height: 1.45; margin-bottom: 6px; }
    .jp-text { display: inline-flex; align-items: center; gap: 5px; cursor: pointer; -webkit-tap-highlight-color: transparent; border-radius: 6px; padding: 1px 0; }
    .jp-text .spk { font-size: 13px; opacity: .55; transition: opacity .2s; }
    .jp-text:active .spk { opacity: 1; }
    @keyframes pulse { 0%,100%{opacity:.55} 50%{opacity:1} }
    .jp-text.speaking .spk { animation: pulse .5s infinite; }
    .answer-wrap { margin-top: 2px; }
    .reveal-btn { font-size: 13px; color: var(--accent); font-weight: 600; cursor: pointer; padding: 3px 0; border: none; background: none; -webkit-tap-highlight-color: transparent; }
    .answer { display: none; margin-top: 6px; padding: 9px 11px; background: var(--reveal-bg); border-radius: 9px; font-size: 15px; font-weight: 500; line-height: 1.4; }
    .answer.show { display: block; }
    .answer .reading { font-size: 11px; color: var(--sub); margin-top: 3px; }
    .empty { text-align: center; padding: 70px 20px; color: var(--sub); }
    .empty .em { font-size: 52px; margin-bottom: 14px; }
    .empty p { font-size: 16px; font-weight: 600; line-height: 1.6; }
    .bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: rgba(245,245,247,0.95); backdrop-filter: blur(12px); padding: 12px 16px max(12px, env(safe-area-inset-bottom)); border-top: 1px solid var(--border); display: flex; gap: 8px; }
    .btn-secondary { flex: 1; padding: 13px; border: 1.5px solid var(--border); border-radius: 11px; background: var(--card); font-size: 14px; font-weight: 600; cursor: pointer; color: var(--text); }
    .btn-primary { flex: 2; padding: 13px; border: none; border-radius: 11px; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
  </style>

</head>

    <div class="mode-toggle">

</div>
<div class="filter-row">
  <button class="filter-btn active" onclick="setCat('all',this)">전체</button>
  <button class="filter-btn" onclick="setCat('basic',this)">🛫 기본/공항</button>
  <button class="filter-btn" onclick="setCat('transport',this)">🚃 교통/길찾기</button>
  <button class="filter-btn" onclick="setCat('food',this)">🍜 음식점</button>
  <button class="filter-btn" onclick="setCat('shop',this)">👕 쇼핑</button>
  <button class="filter-btn review-btn" id="reviewBtn" onclick="toggleReview(this)">❌ 틀린것만</button>
</div>
<div class="cards" id="cards"></div>
<div class="bottom-bar">
  <button class="btn-secondary" onclick="resetAll()">초기화</button>
  <button class="btn-primary" id="revealAllBtn" onclick="toggleRevealAll()">전체 답 보기</button>
</div>

let mode=1,currentCat='all',reviewMode=false,revealAll=false,statuses={};
function save(){
  _ref1.set(statuses).catch(()=>{});
  localStorage.setItem('jp_status',JSON.stringify(statuses));

let activeTTSEl=null,jpVoice=null;
function loadVoice(){const v=speechSynthesis.getVoices().filter(v=>v.lang.startsWith('ja'));if(!v.length)return;for(const kw of['o-ren','premium','enhanced','kyoko','hattori']){const f=v.find(x=>x.name.toLowerCase().includes(kw));if(f){jpVoice=f;return;}}jpVoice=v[0];}
speechSynthesis.onvoiceschanged=loadVoice;loadVoice();
function speak(text,el){speechSynthesis.cancel();if(activeTTSEl)activeTTSEl.classList.remove('speaking');const u=new SpeechSynthesisUtterance(text);u.lang='ja-JP';u.rate=0.85;u.pitch=1.05;if(jpVoice)u.voice=jpVoice;activeTTSEl=el;el.classList.add('speaking');u.onend=u.onerror=()=>el.classList.remove('speaking');speechSynthesis.speak(u);}
function filtered(){let l=DATA;if(currentCat!=='all')l=l.filter(s=>s.cat===currentCat);if(reviewMode)l=l.filter(s=>statuses[s.id]==='x');return l;}
function render(){const list=filtered();const el=document.getElementById('cards');if(!list.length){el.innerHTML=`<div class="empty"><div class="em">${reviewMode?'🎉':'🔍'}</div><p>${reviewMode?'틀린 문제가 없어요!<br>다 맞췄네요 👍':'문장이 없어요'}</p></div>`;updateStats();return;}const showH=currentCat==='all'&&!reviewMode;let html='';let lastCat=null;list.forEach(s=>{if(showH&&s.cat!==lastCat){html+=`<div class="cat-header">${CAT_LABEL[s.cat]}</div>`;lastCat=s.cat;}const st=statuses[s.id];const jpSafe=s.jp.replace(/'/g,"\\'");let qHtml,aHtml;if(mode===1){qHtml=`<div class="question">${s.kr}</div>`;aHtml=`<div class="answer-wrap"><button class="reveal-btn" onclick="toggleAns(${s.id},this)">답 보기 ▾</button><div class="answer${revealAll?' show':''}" id="a${s.id}"><span class="jp-text" onclick="speak('${jpSafe}',this)">${s.jp} <span class="spk">🔊</span></span><div class="reading">${s.rd}</div></div></div>`;}else{qHtml=`<div class="question"><span class="jp-text" onclick="speak('${jpSafe}',this)">${s.jp} <span class="spk">🔊</span></span></div>`;aHtml=`<div class="answer-wrap"><button class="reveal-btn" onclick="toggleAns(${s.id},this)">뜻 보기 ▾</button><div class="answer${revealAll?' show':''}" id="a${s.id}">${s.kr}<div class="reading">${s.rd}</div></div></div>`;}html+=`<div class="card${st?' status-'+st:''}" id="c${s.id}"><div class="ox-wrap"><button class="ox-btn o-btn${st==='o'?' selected':''}" onclick="setSt(${s.id},'o')">⭕</button><button class="ox-btn x-btn${st==='x'?' selected':''}" onclick="setSt(${s.id},'x')">❌</button></div><div class="card-content"><div class="card-num">#${s.id}</div>${qHtml}${aHtml}</div></div>`;});el.innerHTML=html;updateStats();}
function toggleAns(id,btn){const a=document.getElementById('a'+id);const showing=a.classList.toggle('show');btn.textContent=showing?(btn.textContent.includes('답')?'답 닫기 ▴':'뜻 닫기 ▴'):(btn.textContent.includes('답')?'답 보기 ▾':'뜻 보기 ▾');}
function setSt(id,val){if(statuses[id]===val)delete statuses[id];else statuses[id]=val;save();const card=document.getElementById('c'+id);card.className='card'+(statuses[id]?' status-'+statuses[id]:'');card.querySelector('.o-btn').classList.toggle('selected',statuses[id]==='o');card.querySelector('.x-btn').classList.toggle('selected',statuses[id]==='x');updateStats();if(reviewMode&&statuses[id]==='o'){card.style.transition='opacity .3s, transform .3s';card.style.opacity='0';card.style.transform='translateX(40px)';setTimeout(()=>render(),320);}}
function updateStats(){const o=DATA.filter(s=>statuses[s.id]==='o').length;const x=DATA.filter(s=>statuses[s.id]==='x').length;document.getElementById('oCount').textContent=o;document.getElementById('xCount').textContent=x;document.getElementById('total').textContent=DATA.length;document.getElementById('prog').style.width=(o/DATA.length*100)+'%';}
function setMode(m){mode=m;document.getElementById('v1btn').classList.toggle('active',m===1);document.getElementById('v2btn').classList.toggle('active',m===2);revealAll=false;document.getElementById('revealAllBtn').textContent='전체 답 보기';render();}
function setCat(cat,btn){currentCat=cat;document.querySelectorAll('.filter-btn:not(.review-btn)').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function toggleReview(btn){reviewMode=!reviewMode;btn.classList.toggle('active',reviewMode);render();}
function toggleRevealAll(){revealAll=!revealAll;document.querySelectorAll('.answer').forEach(a=>a.classList.toggle('show',revealAll));document.querySelectorAll('.reveal-btn').forEach(btn=>{btn.textContent=revealAll?(mode===1?'답 닫기 ▴':'뜻 닫기 ▴'):(mode===1?'답 보기 ▾':'뜻 보기 ▾');});document.getElementById('revealAllBtn').textContent=revealAll?'전체 답 숨기기':'전체 답 보기';}
function resetAll(){if(!confirm('모든 O/X 기록을 초기화할까요?'))return;statuses={};save();render();}

function _kstDate(){const n=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));return`${n.getMonth()+1}/${n.getDate()}`;}
function _cycleSt(){_appSt1={idx:((_appSt1.idx||0)+1)%3,date:_kstDate()};_stRef1.set(_appSt1);_updateSt();}
function _updateSt(){const s=_ST_LIST[_appSt1.idx||0];document.getElementById('_stBtn').textContent=`${s.icon} ${s.label}`;document.getElementById('_stDate').textContent=_appSt1.date||'';}
