<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐹 소윤의 앱</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #ffdde9 0%, #d4f0ff 100%);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 20px;
    }
    h1 { font-size: 24px; font-weight: 900; color: #333; margin-bottom: 6px; }
    .sub { font-size: 13px; color: #999; margin-bottom: 40px; }
    .cards { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 320px; }
    a {
      display: flex; align-items: center; gap: 16px;
      background: white; border-radius: 20px;
      padding: 20px 22px;
      text-decoration: none; color: #333;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      transition: transform .15s, box-shadow .15s;
    }
    a:active { transform: scale(.97); box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    .icon { font-size: 40px; flex-shrink: 0; }
    .label { font-size: 17px; font-weight: 800; margin-bottom: 3px; }
    .desc { font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
  <h1>🐹 소윤의 앱</h1>
  <p class="sub">원하는 앱을 선택하세요</p>
  <div class="cards">
    <a href="study-challenge.html">
      <div class="icon">📚</div>
      <div>
        <div class="label">공부 챌린지</div>
        <div class="desc">주 5회 · 10분 · ₩100,000 목표</div>
      </div>
    </a>
    <a href="japan-quiz.html">
      <div class="icon">🇯🇵</div>
      <div>
        <div class="label">일본어 여행회화 퀴즈</div>
        <div class="desc">한→日 / 日→한 · 116문장</div>
      </div>
    </a>
  </div>
</body>
</html>
