<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소윤의 일본어 공부</title>
  <link rel="icon" href="soyun.png" type="image/png">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #ffdde9 0%, #d4f0ff 100%);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    .profile-img {
      width: 80px; height: 80px; border-radius: 50%;
      object-fit: cover; margin-bottom: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,.12);
    }
    h1 { font-size: 15px; font-weight: 700; color: #555; margin-bottom: 6px; line-height: 1.6; text-align: center; }
    .sub { font-size: 13px; color: #999; margin-bottom: 24px; }
    .section-label {
      font-size: 11px; font-weight: 700; color: #bbb;
      letter-spacing: .8px; text-transform: uppercase;
      width: 100%; max-width: 320px;
      margin: 16px 0 8px;
    }
    .cards { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 320px; }
    a {
      display: flex; align-items: center; gap: 16px;
      background: white; border-radius: 20px;
      padding: 18px 20px;
      text-decoration: none; color: #333;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      transition: transform .15s, box-shadow .15s;
    }
    a:active { transform: scale(.97); box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    .icon { font-size: 36px; flex-shrink: 0; }
    .label { font-size: 16px; font-weight: 800; margin-bottom: 2px; }
    .desc { font-size: 12px; color: #aaa; }
    .st-badge {
      margin-left: auto; flex-shrink: 0; text-align: center;
    }
    .st-pill {
      font-size: 11px; font-weight: 700;
      padding: 3px 9px; border-radius: 20px;
      background: #f0f0f0; color: #bbb;
      white-space: nowrap;
    }
    .st-pill.s1 { background: #fff3cd; color: #b8860b; }
    .st-pill.s2 { background: #d4f5e5; color: #2da56a; }
    .st-date { font-size: 10px; color: #ccc; margin-top: 3px; }
    .filter-bar {
      display: flex; gap: 6px; flex-wrap: wrap;
      width: 100%; max-width: 320px;
      margin: 0 0 12px;
    }
    .f-btn {
      border: none; border-radius: 20px; padding: 6px 12px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      background: rgba(255,255,255,.7); color: #999;
      transition: all .15s;
    }
    .f-btn.active { background: white; color: #333; box-shadow: 0 2px 8px rgba(0,0,0,.12); }
    .card-item { transition: opacity .2s; }
    .card-item.hidden { display: none; }
  </style>
</head>
<body>
  <img src="soyun.png" class="profile-img" alt="소윤">
  <h1>ちいかわの映画を字幕なしで見たくて、<br>日本語を勉強しています。</h1>
  <p class="sub">~8/21. 치이카와 영화를 자막 없이 보고 싶어서 일본어 공부하고 있어요</p>

  <div class="section-label">챌린지</div>
  <div class="cards">
    <a href="study-challenge.html">
      <div class="icon">📚</div>
      <div>
        <div class="label">공부 챌린지</div>
        <div class="desc">주 5회 · 10분 · ₩100,000 목표</div>
      </div>
    </a>
  </div>

  <div class="section-label">일본어 퀴즈</div>
  <div class="filter-bar">
    <button class="f-btn active" onclick="setFilter(0,this)">전체</button>
    <button class="f-btn" onclick="setFilter(1,this)">🫥 시작전</button>
    <button class="f-btn" onclick="setFilter(2,this)">✏️ 공부중</button>
    <button class="f-btn" onclick="setFilter(3,this)">💯 공부완료!</button>
  </div>
  <div class="cards">
    <a href="japan-quiz.html" class="card-item" data-key="japanQuiz" data-st="0">
      <div class="icon">🇯🇵</div>
      <div>
        <div class="label">여행회화 퀴즈</div>
        <div class="desc">한→日 / 日→한 · 116문장</div>
      </div>
      <div class="st-badge" id="st_japanQuiz"><div class="st-pill">🫥 시작전</div><div class="st-date"></div></div>
    </a>
    <a href="기본일본어표현단어.html" class="card-item" data-key="jpWords" data-st="0">
      <div class="icon">📖</div>
      <div>
        <div class="label">기본 일본어 표현·단어</div>
        <div class="desc">기초 표현 & 단어</div>
      </div>
      <div class="st-badge" id="st_jpWords"><div class="st-pill">🫥 시작전</div><div class="st-date"></div></div>
    </a>
    <a href="날짜_조수사.html" class="card-item" data-key="jpCounter" data-st="0">
      <div class="icon">📅</div>
      <div>
        <div class="label">날짜·조수사</div>
        <div class="desc">날짜 읽기 & 조수사</div>
      </div>
      <div class="st-badge" id="st_jpCounter"><div class="st-pill">🫥 시작전</div><div class="st-date"></div></div>
    </a>
    <a href="2초결정훈련.html" class="card-item" data-key="jp2sec" data-st="0">
      <div class="icon">⚡</div>
      <div>
        <div class="label">2초 결정 훈련</div>
        <div class="desc">순간 반사 트레이닝</div>
      </div>
      <div class="st-badge" id="st_jp2sec"><div class="st-pill">🫥 시작전</div><div class="st-date"></div></div>
    </a>
    <a href="2~8화 복습.html" class="card-item" data-key="jpVocab" data-st="0">
      <div class="icon">🔁</div>
      <div>
        <div class="label">2~8화 복습</div>
        <div class="desc">드라마 표현 복습</div>
      </div>
      <div class="st-badge" id="st_jpVocab"><div class="st-pill">🫥 시작전</div><div class="st-date"></div></div>
    </a>
  </div>

<script>
const _ST_LIST=[{icon:'🫥',label:'시작전',cls:''},{icon:'✏️',label:'공부중',cls:'s1'},{icon:'💯',label:'공부완료!',cls:'s2'}];
const _fbIdx = firebase.initializeApp({
  apiKey:"AIzaSyASL2cZWCbAN0sHiWt2cMsqgbevfwB5AdI",
  authDomain:"japanese-challenge.firebaseapp.com",
  databaseURL:"https://japanese-challenge-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"japanese-challenge",
  storageBucket:"japanese-challenge.firebasestorage.app",
  messagingSenderId:"731920970316",
  appId:"1:731920970316:web:f29acf68702da716c6bae9"
},'index');
const _dbIdx = firebase.database(_fbIdx);

let activeFilter = 0;

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

const ST_ORDER = {1: 0, 0: 1, 2: 2}; // 공부중 > 시작전 > 공부완료

function applyFilter() {
  const container = document.querySelector('.cards:last-of-type');
  const cards = [...document.querySelectorAll('.card-item')];
  cards.forEach(card => {
    const st = parseInt(card.dataset.st || '0');
    card.classList.toggle('hidden', activeFilter !== 0 && st !== activeFilter);
  });
  cards.sort((a, b) => ST_ORDER[parseInt(a.dataset.st||0)] - ST_ORDER[parseInt(b.dataset.st||0)]);
  cards.forEach(card => container.appendChild(card));
}

const APP_KEYS = ['japanQuiz','jpWords','jpCounter','jp2sec','jpVocab'];
APP_KEYS.forEach(key => {
  _dbIdx.ref('appStatus/'+key).on('value', snap => {
    const d = snap.val();
    const el = document.getElementById('st_'+key);
    if(!el) return;
    const idx = d?.idx || 0;
    const date = d?.date || '';
    const s = _ST_LIST[idx];
    el.querySelector('.st-pill').className = 'st-pill' + (s.cls ? ' '+s.cls : '');
    el.querySelector('.st-pill').textContent = s.icon+' '+s.label;
    el.querySelector('.st-date').textContent = date;
    // update data-st on parent card for filtering
    const card = el.closest('.card-item');
    if(card) { card.dataset.st = idx; applyFilter(); }
  });
});
</script>
</body>
</html>
