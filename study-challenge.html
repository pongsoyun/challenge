<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>📚 공부 챌린지</title>
  <link rel="icon" href="soyun.png" type="image/png">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fff8f5;
      --card: #ffffff;
      --pink: #ff6b95;
      --pink-light: #ffe0ea;
      --green: #4ecb8d;
      --green-light: #d4f5e5;
      --yellow: #ffd166;
      --sub: #aaa;
      --text: #333;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      max-width: 500px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* ── Sync status ── */
    #syncBadge {
      position: fixed; top: 10px; right: 12px;
      font-size: 11px; font-weight: 700;
      padding: 4px 10px; border-radius: 20px;
      background: #eee; color: #999;
      transition: all .3s; z-index: 999;
    }
    #syncBadge.ok { background: var(--green-light); color: #2da56a; }
    #syncBadge.err { background: var(--pink-light); color: var(--pink); }
    #syncBadge.saving { background: #fff8e1; color: #e6a817; }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #ffdde9 0%, #d4f0ff 100%);
      padding: 24px 20px 20px;
      text-align: center;
    }
    .header h1 { font-size: 22px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
    .header .subtitle { font-size: 13px; color: #888; line-height: 1.5; }

    /* ── Participant Cards ── */
    .participants {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; padding: 16px;
    }
    .p-card {
      background: var(--card);
      border-radius: 22px;
      padding: 18px 14px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.07);
    }
    .avatar-wrap {
      width: 80px; height: 80px;
      border-radius: 50%;
      margin: 0 auto 10px;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 52px;
      background: #f5f5f5;
    }
    .avatar-wrap img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
    }
    .p-name { font-size: 17px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
    .p-savings {
      font-size: 24px; font-weight: 900; color: var(--pink);
      margin-bottom: 10px; letter-spacing: -0.5px;
    }
    .prog-track {
      height: 10px; background: #f0f0f0; border-radius: 10px;
      overflow: hidden; margin-bottom: 5px;
    }
    .prog-bar {
      height: 100%; border-radius: 10px;
      background: linear-gradient(90deg, #ffb3cb, #ff6b95);
      transition: width .5s cubic-bezier(.4,0,.2,1);
    }
    .prog-label { font-size: 11px; color: var(--sub); font-weight: 600; }
    .weeks-done { font-size: 12px; color: #bbb; margin-top: 4px; }

    /* ── Section title ── */
    .section-title {
      font-size: 13px; font-weight: 700; color: #bbb;
      padding: 4px 16px 8px; letter-spacing: .5px;
    }

    /* ── Week Card ── */
    .week-card {
      background: var(--card);
      border-radius: 18px;
      margin: 0 16px 10px;
      padding: 14px 14px 10px;
      box-shadow: 0 2px 10px rgba(0,0,0,.05);
      border: 2px solid transparent;
      transition: border-color .3s;
    }
    .week-card.both-done { border-color: var(--green); }
    .week-card.future { opacity: .45; pointer-events: none; }
    .week-card.current { border-color: #ffd166; }

    .week-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .week-num {
      font-size: 14px; font-weight: 800; color: var(--text);
    }
    .week-date { font-size: 11px; color: var(--sub); }

    /* Day grid */
    .day-labels {
      display: grid;
      grid-template-columns: 36px repeat(7, 1fr);
      gap: 3px; margin-bottom: 5px;
    }
    .dl { text-align: center; font-size: 10px; font-weight: 700; color: var(--sub); padding: 2px 0; }
    .dl.sat { color: #74b9ff; }
    .dl.sun { color: #ff7675; }
    .dl.today-col { color: var(--pink); }

    .person-row {
      display: grid;
      grid-template-columns: 36px repeat(7, 1fr) auto;
      gap: 3px; align-items: center; margin-bottom: 5px;
    }
    .p-icon { font-size: 22px; text-align: center; line-height: 1; }
    .p-icon img { width: 26px; height: 26px; object-fit: cover; border-radius: 50%; }

    .day-btn {
      aspect-ratio: 1; border-radius: 8px;
      border: 2px solid #f0f0f0;
      background: #fafafa;
      font-size: 13px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
      color: transparent;
      min-width: 0;
    }
    .day-btn:active { transform: scale(.85); }
    .day-btn.checked { background: var(--green-light); border-color: var(--green); color: var(--green); }
    .day-btn.today-col { border-color: var(--yellow); background: #fffbf0; }
    .day-btn.today-col.checked { background: var(--green-light); border-color: var(--green); }

    .row-result {
      font-size: 11px; font-weight: 700; padding: 3px 8px;
      border-radius: 20px; white-space: nowrap; margin-left: 2px;
      background: #f5f5f5; color: #bbb; min-width: 52px; text-align: center;
    }
    .row-result.done { background: var(--green-light); color: #2da56a; }
    .row-result.fail { background: var(--pink-light); color: var(--pink); }
  </style>
</head>
<body>

<div id="syncBadge">연결 중…</div>

<div class="header">
  <h1>📚 공부 챌린지</h1>
  <div class="subtitle">주 5회 이상 · 하루 10분 → 주당 ₩5,000 적립<br>₩10,000 시작 → 목표 ₩100,000 (8/20 포함 주까지)</div>
</div>

<div class="participants">
  <div class="p-card">
    <div class="avatar-wrap">
      <img src="soyun.png" onerror="this.parentElement.innerHTML='🐹'" alt="소윤">
    </div>
    <div class="p-name">소윤</div>
    <div class="p-savings" id="sav_soyun">₩10,000</div>
    <div class="prog-track"><div class="prog-bar" id="prog_soyun" style="width:10%"></div></div>
    <div class="prog-label" id="pct_soyun">10% 달성</div>
    <div class="weeks-done" id="wd_soyun">0주 완료</div>
  </div>
  <div class="p-card">
    <div class="avatar-wrap">
      <img src="seung.png" onerror="this.parentElement.innerHTML='🐰'" alt="승">
    </div>
    <div class="p-name">승</div>
    <div class="p-savings" id="sav_seung">₩10,000</div>
    <div class="prog-track"><div class="prog-bar" id="prog_seung" style="width:10%"></div></div>
    <div class="prog-label" id="pct_seung">10% 달성</div>
    <div class="weeks-done" id="wd_seung">0주 완료</div>
  </div>
</div>

<div class="section-title">주차별 체크</div>
<div id="weeksContainer"></div>

<script>
// ── Firebase init ──────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyASL2cZWCbAN0sHiWt2cMsqgbevfwB5AdI",
  authDomain: "japanese-challenge.firebaseapp.com",
  databaseURL: "https://japanese-challenge-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "japanese-challenge",
  storageBucket: "japanese-challenge.firebasestorage.app",
  messagingSenderId: "731920970316",
  appId: "1:731920970316:web:f29acf68702da716c6bae9"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const docRef = db.ref('challenge/data');

// ── Constants ──────────────────────────────────────────────
const WEEKS = 18;
const START = new Date('2026-04-20T00:00:00');
const DAYS = ['월','화','수','목','금','토','일'];
const BASE = 10000, REWARD = 5000, GOAL = 100000;
const PERSONS = ['soyun','seung'];
const ICONS = { soyun: '🐹', seung: '🐰' };
const NAMES = { soyun: '소윤', seung: '승' };

let state = {};
let isSaving = false;
const badge = document.getElementById('syncBadge');

// ── State helpers ──────────────────────────────────────────
function initState() {
  PERSONS.forEach(p => {
    if (!state[p]) state[p] = [];
    while (state[p].length < WEEKS) state[p].push(Array(7).fill(false));
    state[p] = state[p].map(w => {
      if (!Array.isArray(w)) w = Array(7).fill(false);
      while (w.length < 7) w.push(false);
      return w;
    });
  });
}

// ── Save ───────────────────────────────────────────────────
function save() {
  badge.textContent = '저장 중…'; badge.className = 'saving';
  docRef.set(state)
    .then(() => { badge.textContent = '✓ 저장됨'; badge.className = 'ok'; })
    .catch(e => {
      console.error(e);
      badge.textContent = '⚠ 저장 실패'; badge.className = 'err';
    });
}

// ── Real-time listener ─────────────────────────────────────
docRef.on('value', snap => {
  badge.textContent = '● 실시간 연결'; badge.className = 'ok';
  const data = snap.val();
  if (data) {
    // Realtime DB returns arrays as objects with numeric keys — convert back
    state = {};
    PERSONS.forEach(p => {
      state[p] = data[p]
        ? Object.values(data[p]).map(w => w ? Object.values(w).map(Boolean) : Array(7).fill(false))
        : [];
    });
  } else {
    state = {};
  }
  initState();
  renderWeeksFinal();
  updateAll();
}, err => {
  console.error('DB error:', err);
  badge.textContent = '⚠ 오프라인'; badge.className = 'err';
  try { state = JSON.parse(localStorage.getItem('challenge2') || '{}'); } catch(e) { state = {}; }
  initState();
  renderWeeksFinal();
  updateAll();
});

// ── Toggle ─────────────────────────────────────────────────
function toggle(p, wi, di) {
  state[p][wi][di] = !state[p][wi][di];
  updateAll();
  save();
}

// ── Date utils ─────────────────────────────────────────────
function weekStart(wi) {
  const d = new Date(START); d.setDate(d.getDate() + wi * 7); return d;
}
function fmtDate(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
function today0() { const t = new Date(); t.setHours(0,0,0,0); return t; }
function isFuture(d) { return d > today0(); }
function isToday(d) {
  const t = new Date();
  return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
}

// ── Calculations ───────────────────────────────────────────
function countChecked(p, wi) { return state[p][wi].filter(Boolean).length; }
function cnt(p, wi) { return countChecked(p, wi) >= 5; }

function calcSavings(p) {
  let s = BASE;
  for (let w = 0; w < WEEKS; w++) if (countChecked(p, w) >= 5) s += REWARD;
  return s;
}
function countDoneWeeks(p) {
  let n = 0;
  for (let w = 0; w < WEEKS; w++) if (countChecked(p, w) >= 5) n++;
  return n;
}

// ── Render icon ────────────────────────────────────────────
function renderIcon(p) {
  return `<div class="p-icon">
    <img src="${p}.png" onerror="this.parentElement.innerHTML='${ICONS[p]}'" alt="${NAMES[p]}">
  </div>`;
}

// ── Render weeks ───────────────────────────────────────────
function renderWeeksFinal() {
  const t0 = today0();
  let html = '';

  for (let wi = 0; wi < WEEKS; wi++) {
    const ws = weekStart(wi);
    const we = new Date(ws); we.setDate(we.getDate() + 6);
    const isCurrentWeek = ws <= t0 && t0 <= we;
    const isFutureWeek = ws > t0;
    const weekOver = we < t0;

    let dlHtml = '<div></div>';
    for (let di = 0; di < 7; di++) {
      const d = new Date(ws); d.setDate(d.getDate() + di);
      const cls = isToday(d) ? 'today-col' : di===5 ? 'sat' : di===6 ? 'sun' : '';
      dlHtml += `<div class="dl ${cls}">${DAYS[di]}</div>`;
    }

    let rowsHtml = '';
    PERSONS.forEach(p => {
      const c = countChecked(p, wi);
      let resCls = '', resTxt = `${c}/5`;
      if (c >= 5) { resCls = 'done'; resTxt = '+₩5,000'; }
      else if (weekOver) { resCls = 'fail'; resTxt = `${c}/5 ✗`; }

      let daysHtml = renderIcon(p);
      for (let di = 0; di < 7; di++) {
        const d = new Date(ws); d.setDate(d.getDate() + di);
        const checked = state[p][wi][di];
        const tod = isToday(d);
        const fut = isFuture(d);
        const cls = ['day-btn', checked?'checked':'', tod?'today-col':''].filter(Boolean).join(' ');
        const onclick = fut ? '' : `onclick="toggle('${p}',${wi},${di})"`;
        const style = fut ? 'style="cursor:default;opacity:.35"' : '';
        daysHtml += `<button class="${cls}" id="btn_${p}_${wi}_${di}" ${onclick} ${style}>${checked?'✓':''}</button>`;
      }
      daysHtml += `<div class="row-result ${resCls}" id="res_${p}_${wi}">${resTxt}</div>`;
      rowsHtml += `<div class="person-row">${daysHtml}</div>`;
    });

    const both = !isFutureWeek && cnt('soyun',wi) && cnt('seung',wi);
    const cardCls = ['week-card',
      isFutureWeek ? 'future' : '',
      isCurrentWeek ? 'current' : '',
      both ? 'both-done' : ''
    ].filter(Boolean).join(' ');

    html += `<div class="${cardCls}" id="wk_${wi}">
      <div class="week-header">
        <span class="week-num">Week ${wi+1} ${isCurrentWeek?'🟡':both?'✅':''}</span>
        <span class="week-date">${fmtDate(ws)} ~ ${fmtDate(we)}</span>
      </div>
      <div class="day-labels">${dlHtml}</div>
      ${rowsHtml}
    </div>`;
  }

  document.getElementById('weeksContainer').innerHTML = html;
}

// ── Update summary cards ───────────────────────────────────
function updateAll() {
  PERSONS.forEach(p => {
    const s = calcSavings(p);
    const pct = Math.round(s / GOAL * 100);
    const dw = countDoneWeeks(p);
    document.getElementById(`sav_${p}`).textContent = '₩' + s.toLocaleString();
    document.getElementById(`prog_${p}`).style.width = pct + '%';
    document.getElementById(`pct_${p}`).textContent = pct + '% 달성';
    document.getElementById(`wd_${p}`).textContent = `${dw}주 완료`;
  });

  const t0 = today0();
  for (let wi = 0; wi < WEEKS; wi++) {
    const ws = weekStart(wi);
    const we = new Date(ws); we.setDate(we.getDate() + 6);
    const weekOver = we < t0;

    PERSONS.forEach(p => {
      const c = countChecked(p, wi);
      for (let di = 0; di < 7; di++) {
        const btn = document.getElementById(`btn_${p}_${wi}_${di}`);
        if (btn) {
          const checked = state[p][wi][di];
          const todCls = btn.classList.contains('today-col') ? 'today-col' : '';
          btn.className = ['day-btn', checked?'checked':'', todCls].filter(Boolean).join(' ');
          btn.textContent = checked ? '✓' : '';
        }
      }
      const res = document.getElementById(`res_${p}_${wi}`);
      if (res) {
        if (c >= 5) { res.className='row-result done'; res.textContent='+₩5,000'; }
        else if (weekOver) { res.className='row-result fail'; res.textContent=`${c}/5 ✗`; }
        else { res.className='row-result'; res.textContent=`${c}/5`; }
      }
    });

    const card = document.getElementById(`wk_${wi}`);
    if (card) {
      const isCurrentWeek = ws <= t0 && t0 <= we;
      const isFutureWeek = ws > t0;
      const both = !isFutureWeek && cnt('soyun',wi) && cnt('seung',wi);
      card.className = ['week-card',
        isFutureWeek ? 'future' : '',
        isCurrentWeek ? 'current' : '',
        both ? 'both-done' : ''
      ].filter(Boolean).join(' ');
    }
  }
}
</script>
</body>
</html>
