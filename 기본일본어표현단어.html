<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic','Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}

header{background:#1a1a2e;color:#fff;padding:14px 16px 10px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.3)}
h1{font-size:1.1rem;font-weight:700;margin-bottom:8px;letter-spacing:-.3px}
.progress-bar{height:5px;background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;background:#4ade80;border-radius:3px;transition:width .4s ease}
.stats{display:flex;gap:10px;font-size:.72rem;color:rgba(255,255,255,.7)}

.filter-bar{display:flex;gap:6px;padding:10px 16px;background:#fff;border-bottom:1px solid #e8eaf0;overflow-x:auto;position:sticky;top:72px;z-index:199;-ms-overflow-style:none;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.f-btn{padding:6px 14px;border:1.5px solid #dde0e8;border-radius:20px;background:#fff;font-size:.78rem;color:#555;cursor:pointer;white-space:nowrap;font-weight:500;transition:all .15s}
.f-btn.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}

.cat-label{font-size:.7rem;font-weight:700;color:#6c757d;text-transform:uppercase;letter-spacing:.5px;padding:16px 16px 6px}

.cards{padding:8px 16px 80px;display:flex;flex-direction:column;gap:10px}
.card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:4px solid #e0e4ed;transition:all .25s}
.card.done{border-left-color:#4ade80;opacity:.5}

.card-wrap{display:flex;align-items:flex-start;gap:8px}
.num{font-size:.7rem;color:#aaa;min-width:22px;font-weight:600;padding-top:4px;flex-shrink:0}
.word-block{flex:1;min-width:0}
.word-line{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.word-text{font-size:1.08rem;font-weight:700;line-height:1.4}
ruby rt{font-size:.55em;color:#aaa;font-weight:400}
.kr-badge{font-size:.85rem;font-weight:700;color:#007aff}
.sub-line{display:flex;align-items:center;gap:5px;margin-top:4px}
.sub-text{font-size:.78rem;color:#888;flex:1}

.chk{width:28px;height:28px;border:2px solid #dde0e8;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;font-size:14px}
.chk.on{background:#4ade80;border-color:#4ade80;color:#fff}

.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:#fff;border-top:1px solid #e8eaf0;display:flex;gap:8px;z-index:199}
.reset-btn{flex:1;padding:12px;background:#f0f2f5;color:#555;border:none;border-radius:10px;font-size:.88rem;font-weight:600;cursor:pointer;font-family:inherit}

.tts-btn{background:none;border:none;font-size:1rem;cursor:pointer;padding:2px 4px;border-radius:6px;transition:transform .15s;line-height:1;flex-shrink:0}
.tts-btn:active{transform:scale(.85)}
.tts-btn.playing{animation:pulse .6s infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.4}}

.empty{text-align:center;padding:60px 20px;color:#aaa;font-size:.9rem}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

const TOTAL = WORDS.length;
let wordState = {};
let currentFilter = 'all';

function toRuby(s){
  return s.replace(/([一-鿿㐀-䶿々]+)\(([ぁ-ゔ]+)\)/g,'<ruby>$1<rt>$2</rt></ruby>');
}
function stripFurigana(s){
  return s.replace(/\([ぁ-ゔァ-ン]+\)/g,'');
}

let currentAudio = null;
function speak(text, btn){
  const clean = stripFurigana(text);
  if(currentAudio){ currentAudio.pause(); currentAudio=null; }
  document.querySelectorAll('.tts-btn.playing').forEach(b=>b.classList.remove('playing'));
  if(btn) btn.classList.add('playing');
  const url='https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=ja&client=gtx&q='+encodeURIComponent(clean);
  const audio=new Audio(url);
  audio.playbackRate=0.95;
  currentAudio=audio;
  audio.onended=()=>{if(btn)btn.classList.remove('playing');currentAudio=null;};
  audio.onerror=()=>{
    if(btn)btn.classList.remove('playing');
    const u=new SpeechSynthesisUtterance(clean);
    u.lang='ja-JP';u.rate=0.85;
    speechSynthesis.speak(u);
  };
  audio.play().catch(()=>audio.onerror());
}

function render(){
  const wrap=document.getElementById('cards');
  wrap.innerHTML='';
  let lastCat=null, visible=0;

  WORDS.forEach(w=>{
    const done=!!wordState[w.id];
    let show=true;
    if(currentFilter==='todo') show=!done;
    else if(currentFilter==='done') show=done;
    if(!show) return;
    visible++;

    if(w.cat!==lastCat){
      const lbl=document.createElement('div');
      lbl.className='cat-label';
      lbl.textContent=w.cat;
      wrap.appendChild(lbl);
      lastCat=w.cat;
    }

    const card=document.createElement('div');
    card.className='card'+(done?' done':'');
    card.id='card-'+w.id;

    const cwrap=document.createElement('div');
    cwrap.className='card-wrap';

    const num=document.createElement('span');
    num.className='num';
    num.textContent=w.id;

    const block=document.createElement('div');
    block.className='word-block';

    // word + TTS + meaning
    const wLine=document.createElement('div');
    wLine.className='word-line';

    const wText=document.createElement('span');
    wText.className='word-text';
    wText.innerHTML=toRuby(w.w);

    const wTts=document.createElement('button');
    wTts.className='tts-btn';
    wTts.textContent='🔊';
    wTts.title='소리 듣기';
    wTts.onclick=()=>speak(w.w,wTts);

    const krBadge=document.createElement('span');
    krBadge.className='kr-badge';
    krBadge.textContent=w.kr;

    wLine.appendChild(wText);
    wLine.appendChild(wTts);
    wLine.appendChild(krBadge);

    // example
    const sLine=document.createElement('div');
    sLine.className='sub-line';

    const sTxt=document.createElement('span');
    sTxt.className='sub-text';
    sTxt.textContent='예) '+w.sub;

    const sTts=document.createElement('button');
    sTts.className='tts-btn';
    sTts.textContent='🔊';
    sTts.title='소리 듣기';
    sTts.onclick=()=>speak(w.sub,sTts);

    sLine.appendChild(sTxt);
    sLine.appendChild(sTts);

    block.appendChild(wLine);
    block.appendChild(sLine);

    const chk=document.createElement('div');
    chk.className='chk'+(done?' on':'');
    chk.textContent=done?'✓':'';
    chk.onclick=()=>toggleDone(w.id);

    cwrap.appendChild(num);
    cwrap.appendChild(block);
    cwrap.appendChild(chk);
    card.appendChild(cwrap);
    wrap.appendChild(card);
  });

  if(!visible){
    const e=document.createElement('div');
    e.className='empty';
    e.textContent='해당하는 단어가 없습니다 😊';
    wrap.appendChild(e);
  }
  updateStats();
}

function toggleDone(id){
  wordState[id]=!wordState[id];
  if(!wordState[id]) delete wordState[id];
  saveState();
  render();
}

function updateStats(){
  const done=Object.keys(wordState).filter(k=>wordState[k]).length;
  document.getElementById('sTot').textContent=done+'/'+TOTAL;
  document.getElementById('sOk').textContent='✅ '+done;
  document.getElementById('sLeft').textContent='📚 '+(TOTAL-done)+' 남음';
  document.getElementById('pFill').style.width=(done/TOTAL*100).toFixed(1)+'%';
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  render();
}

function resetAll(){
  if(!confirm('전체 초기화하시겠어요?')) return;
  wordState={};
  saveState();
  currentFilter='all';
  document.querySelectorAll('.f-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

const _ST_LIST=[{icon:'🫥',label:'시작전'},{icon:'✏️',label:'공부중'},{icon:'💯',label:'공부완료!'}];

function _kstDate(){const n=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));return`${n.getMonth()+1}/${n.getDate()}`;}
function _cycleSt(){_appSt2={idx:((_appSt2.idx||0)+1)%3,date:_kstDate()};_stRef2.set(_appSt2);_updateSt();}
function _updateSt(){const s=_ST_LIST[_appSt2.idx||0];document.getElementById('_stBtn').textContent=`${s.icon} ${s.label}`;document.getElementById('_stDate').textContent=_appSt2.date||'';}
</script>

<div style="position:fixed;bottom:16px;right:16px;z-index:9999;text-align:center;">

  <div id="_stDate" style="font-size:11px;color:#aaa;margin-top:3px;"></div>
</div>
