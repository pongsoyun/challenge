// 시드 기반 셔플 (문제가 항상 같은 순서로 섞이도록)
function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 1103515245 + 12345) & 0x7fffffff;
    const j = s % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
const SHUFFLED = seededShuffle(DATA, 42);

function seededRand(seed){ return ((seed * 1103515245 + 12345) & 0x7fffffff) / 0x7fffffff; }

function buildChoices(v) {
  const sameCat = DATA.filter(x => x.id !== v.id && x.cat === v.cat);
  const other = DATA.filter(x => x.id !== v.id && x.cat !== v.cat);
  const pool = sameCat.length >= 2 ? sameCat : [...sameCat, ...other];
  let s1 = Math.floor(seededRand(v.id * 7 + 3) * pool.length);
  let s2 = Math.floor(seededRand(v.id * 13 + 5) * pool.length);
  if (s2 === s1) s2 = (s2 + 1) % pool.length;
  const choices = [
    {id: v.id, kr: v.kr, jpPlain: v.jpPlain, jpDisp: v.jpDisp, correct: true},
    {id: pool[s1].id, kr: pool[s1].kr, jpPlain: pool[s1].jpPlain, jpDisp: pool[s1].jpDisp, correct: false},
    {id: pool[s2].id, kr: pool[s2].kr, jpPlain: pool[s2].jpPlain, jpDisp: pool[s2].jpDisp, correct: false},
  ];
  let s = v.id;
  for (let i = choices.length - 1; i > 0; i--) {
    s = (s * 1103515245 + 12345) & 0x7fffffff;
    [choices[i], choices[s % (i + 1)]] = [choices[s % (i + 1)], choices[i]];
  }
  return choices;
}

// ── TTS ──
let _voices = [];
speechSynthesis.onvoiceschanged = () => { _voices = speechSynthesis.getVoices(); };
_voices = speechSynthesis.getVoices();

function _bestJpVoice(){
  const vl = _voices.filter(v => v.lang.startsWith('ja'));
  return vl.find(v => /o.?ren/i.test(v.name))       // Mac: O-Ren (가장 자연스러움)
    || vl.find(v => /premium/i.test(v.name))
    || vl.find(v => /enhanced/i.test(v.name))
    || vl.find(v => /kyoko/i.test(v.name))
    || vl[0];
}

function speak(text, btn) {
  if(currentAudio){ currentAudio.pause(); currentAudio=null; }
  document.querySelectorAll('.tts-btn.playing').forEach(b=>b.classList.remove('playing'));
  if(btn) btn.classList.add('playing');

  function fallback(){
    if(btn) btn.classList.remove('playing');
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = 0.9;
    u.pitch = 1;
    const best = _bestJpVoice();
    if(best) u.voice = best;
    speechSynthesis.speak(u);
  }

  const url = 'https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=ja&client=tw-ob&q=' + encodeURIComponent(text);
  const audio = new Audio(url);
  currentAudio = audio;
  audio.onended = ()=>{ if(btn) btn.classList.remove('playing'); currentAudio=null; };
  audio.onerror = fallback;
  audio.play().catch(fallback);
}

function setMode(m) {
  mode = m;
  document.getElementById('m1btn').classList.toggle('active', m===1);
  document.getElementById('m2btn').classList.toggle('active', m===2);
  render();
}

// ── FILTER ──
const cats = ['전체', ...new Set(DATA.map(v=>v.cat))];
const statuses = ['전체','미답변','틀린것만','맞은것','완료(⭐)'];

function getStatus(v){
  const s = state[v.id];
  if(!s) return 'none';
  if(s.mastered) return 'mastered';
  if(s.correct === true) return 'correct';
  if(s.correct === false) return 'wrong';
  return 'none';
}

function filteredData(){
  return SHUFFLED.filter(v => {
    const catOk = activeCat==='전체' || v.cat===activeCat;
    const st = getStatus(v);
    const stOk = activeStatus==='전체' ? true :
      activeStatus==='미답변' ? st==='none' :
      activeStatus==='틀린것만' ? st==='wrong' :
      activeStatus==='맞은것' ? st==='correct' :
      activeStatus==='완료(⭐)' ? st==='mastered' : true;
    return catOk && stOk;
  });
}

function renderFilters(){
  const cf = document.getElementById('catFilters');
  cf.innerHTML = cats.map(c=>`<button class="filter-btn${activeCat===c?' active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
  const sf = document.getElementById('statusFilters');
  sf.innerHTML = statuses.map(s=>`<button class="status-btn${activeStatus===s?' active':''}" onclick="setStatus('${s}')">${s}</button>`).join('');
}
function setCat(c){ activeCat=c; render(); }
function setStatus(s){ activeStatus=s; render(); }

function renderStats(){
  const total = DATA.length;
  const done = DATA.filter(v=>{const s=state[v.id]; return s&&(s.correct===true||s.mastered);}).length;
  const wrong = DATA.filter(v=>{const s=state[v.id]; return s&&s.correct===false&&!s.mastered;}).length;
  const mastered = DATA.filter(v=>state[v.id]&&state[v.id].mastered).length;
  document.getElementById('progBar').style.width=(done/total*100)+'%';
  document.getElementById('progLabel').textContent=`${done} / ${total} 완료`;
  document.getElementById('stats').innerHTML=`<span>전체 <b>${total}</b></span><span>완료 <b>${done}</b></span><span>틀림 <b>${wrong}</b></span><span>⭐ <b>${mastered}</b></span>`;
}

function renderCards(){
  const list = filteredData();
  const el = document.getElementById('cardList');
  if(!list.length){ el.innerHTML='<div class="empty">해당하는 문항이 없습니다</div>'; return; }

  el.innerHTML = list.map((v, idx) => {
    const s = state[v.id] || {};
    const choices = buildChoices(v);
    const answered = s.correct !== undefined;
    const statusCls = s.mastered ? ' mastered' : s.correct===true ? ' correct' : s.correct===false ? ' wrong' : '';

    // 질문 HTML
    const qHtml = mode===1
      ? `<div class="q-jp">${v.jpDisp} <button class="tts-btn" onclick="speak('${v.jpPlain.replace(/'/g,"\\'")}',this)">🔊</button></div>`
      : `<div class="q-kr">${v.kr}</div>`;

    // 선택지 HTML
    const choiceBtns = choices.map(c => {
      let cls = '';
      if(answered){
        if(c.correct) cls='show-correct';
        else if(!c.correct && s.chosenId===c.id) cls='wrong-ans';
      }
      const label = mode===1 ? c.kr : c.jpPlain;
      return `<button class="choice-btn ${cls}" ${answered?'disabled':''} onclick="answer(${v.id},${c.id},${c.correct})">${label}</button>`;
    }).join('');

    // 정답 보여주기 (답변 후)
    const ansHtml = answered ? `<div class="ans-area show">
      <div class="ans-jp">${v.jpDisp} <button class="tts-btn" onclick="speak('${v.jpPlain.replace(/'/g,"\\'")}',this)">🔊</button></div>
      <div style="font-size:.82rem;color:#888;margin-top:2px">${v.kr}</div>
    </div>` : `<div class="ans-area"></div>`;

    return `<div class="card${statusCls}" id="card-${v.id}">
      <div class="card-header">
        <span class="card-num">${idx+1}</span>
        <span class="card-cat">${v.cat}</span>
        <button class="master-btn" onclick="toggleMaster(${v.id})">${s.mastered?'⭐':'☆'}</button>
      </div>
      <div class="q-wrap">${qHtml}</div>
      <div class="choices" id="choices-${v.id}">${choiceBtns}</div>
      ${ansHtml}
    </div>`;
  }).join('');
}

function render(){ renderFilters(); renderStats(); renderCards(); }

function answer(id, chosenId, isCorrect){
  state[id] = { correct: isCorrect, chosenId, mastered: state[id]?.mastered||false };
  saveState();
  const card = document.getElementById('card-'+id);
  if(!card) return;
  card.classList.remove('correct','wrong');
  card.classList.add(isCorrect?'correct':'wrong');
  const choices = buildChoices(DATA.find(x=>x.id===id));
  card.querySelectorAll('.choice-btn').forEach((b,i)=>{
    b.disabled=true;
    const c=choices[i];
    if(c.correct) b.className='choice-btn show-correct';
    else if(c.id===chosenId&&!isCorrect) b.className='choice-btn wrong-ans';
    else b.className='choice-btn';
  });
  const ans = card.querySelector('.ans-area');
  if(ans) ans.classList.add('show');
  const v = DATA.find(x=>x.id===id);
  setTimeout(()=>{
    const btn = card.querySelector('.ans-area .tts-btn');
    if(btn&&v) speak(v.jpPlain, btn);
  },300);
  renderStats();
}

function toggleMaster(id){
  if(!state[id]) state[id]={correct:undefined,mastered:false};
  state[id].mastered = !state[id].mastered;
  saveState(); render();
}

function resetAll(){
  if(!confirm('모든 진행 상태를 초기화할까요?')) return;
  state={}; saveState(); render();
}

// ── INIT ──
loadState(); render();

  const d=snap.val();

const _ST_LIST=[{icon:'🫥',label:'시작전'},{icon:'✏️',label:'공부중'},{icon:'💯',label:'공부완료!'}];
const _stRef6=_db6.ref('appStatus/iAdj');
let _appSt6={idx:0,date:''};
_stRef6.on('value',snap=>{const d=snap.val();if(d){_appSt6=d;_updateSt();}});
function _kstDate(){const n=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));return`${n.getMonth()+1}/${n.getDate()}`;}
function _cycleSt(){_appSt6={idx:((_appSt6.idx||0)+1)%3,date:_kstDate()};_stRef6.set(_appSt6);_updateSt();}
function _updateSt(){const s=_ST_LIST[_appSt6.idx||0];document.getElementById('_stBtn').textContent=`${s.icon} ${s.label}`;document.getElementById('_stDate').textContent=_appSt6.date||'';}
