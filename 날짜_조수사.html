<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>일본어 날짜·조수사 훈련</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#fdf6ee;color:#333;min-height:100vh}
  header{background:#e8946a;color:#fff;padding:14px 16px;text-align:center;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.15)}
  header h1{font-size:1.1rem;font-weight:700}
  .progress-bar-wrap{background:rgba(255,255,255,.3);border-radius:99px;height:6px;margin-top:8px}
  .progress-bar{height:6px;border-radius:99px;background:#fff;transition:width .4s}
  .progress-label{font-size:.75rem;margin-top:4px;opacity:.9}

  .filters{display:flex;flex-wrap:wrap;gap:6px;padding:12px 12px 6px;justify-content:center}
  .filter-btn{border:none;border-radius:20px;padding:6px 14px;font-size:.8rem;cursor:pointer;font-weight:600;background:#ffe5d0;color:#c0603a;transition:all .15s}
  .filter-btn.active{background:#e8946a;color:#fff}

  .status-filters{display:flex;gap:6px;padding:0 12px 12px;justify-content:center;flex-wrap:wrap}
  .status-btn{border:none;border-radius:20px;padding:5px 12px;font-size:.75rem;cursor:pointer;background:#f0e0d0;color:#888;font-weight:600}
  .status-btn.active{background:#c0603a;color:#fff}

  .stats{display:flex;gap:8px;padding:0 12px 10px;justify-content:center;font-size:.8rem;color:#888}
  .stats span{background:#fff;padding:4px 10px;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .stats span b{color:#e8946a}

  .card-list{padding:0 12px 80px;display:flex;flex-direction:column;gap:10px}

  .card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.07);border:2px solid transparent;transition:border-color .2s}
  .card.correct{border-color:#4caf50}
  .card.wrong{border-color:#f44336}
  .card.mastered{opacity:.6}

  .card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .card-num{font-size:.7rem;color:#bbb;min-width:24px}
  .card-cat{font-size:.7rem;background:#ffe5d0;color:#c0603a;padding:2px 8px;border-radius:10px;font-weight:600}
  .master-btn{margin-left:auto;font-size:1.1rem;background:none;border:none;cursor:pointer;padding:2px 4px}

  .card-word{font-size:1.5rem;font-weight:700;text-align:center;padding:8px 0 4px;color:#333}
  .card-word-sub{font-size:.8rem;text-align:center;color:#999;margin-bottom:12px}

  .choices{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
  .choice-btn{border:2px solid #eee;background:#fafafa;border-radius:10px;padding:10px 4px;font-size:1rem;font-weight:700;cursor:pointer;color:#444;transition:all .15s;line-height:1.3;text-align:center}
  .choice-btn:active{transform:scale(.97)}
  .choice-btn.correct-ans{background:#e8f5e9;border-color:#4caf50;color:#2e7d32}
  .choice-btn.wrong-ans{background:#ffebee;border-color:#f44336;color:#c62828}
  .choice-btn.show-correct{background:#e8f5e9;border-color:#4caf50;color:#2e7d32}
  .choice-btn:disabled{cursor:default}
  .choice-reading{font-size:.7rem;display:block;color:#888;font-weight:400;margin-top:2px}

  .answer-area{display:none;margin-top:12px;padding-top:10px;border-top:1px solid #f0e0d0}
  .answer-area.show{display:block}
  .answer-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .answer-ja{font-size:1.1rem;font-weight:700;color:#333}
  .answer-kr{font-size:.85rem;color:#888}
  .tts-btn{border:none;background:#ffe5d0;border-radius:50%;width:30px;height:30px;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .tts-btn.playing{background:#e8946a;color:#fff}

  .reset-wrap{text-align:center;padding:12px}
  .reset-btn{border:none;background:#eee;border-radius:20px;padding:8px 20px;font-size:.85rem;color:#666;cursor:pointer}

  .empty{text-align:center;padding:60px 20px;color:#bbb;font-size:.9rem}
</style>

// ─── STATE ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'jpCounter';
let state = {};
let activeCat = '전체';
let activeStatus = '전체';
let currentAudio = null;

// ── Firebase ────────────────────────────────────────────────
const _fbApp3 = firebase.initializeApp({

function loadState(){
  try{ state = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); }
  catch(e){ state = {}; }
}
function saveState(){
  _ref3.set(state).catch(()=>{});
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ─── CHOICE GENERATION ────────────────────────────────────────────────────────
function seededRand(seed){ return ((seed * 1103515245 + 12345) & 0x7fffffff) / 0x7fffffff; }

function buildChoices(v){
  // pool: same category first, then others
  const sameCat = VOCAB.filter(x => x.id !== v.id && x.cat === v.cat);
  const otherCat = VOCAB.filter(x => x.id !== v.id && x.cat !== v.cat);
  let pool = sameCat.length >= 2 ? sameCat : [...sameCat, ...otherCat];

  const s1 = Math.floor(seededRand(v.id * 7 + 3) * pool.length);
  let s2 = Math.floor(seededRand(v.id * 13 + 5) * pool.length);
  if(s2 === s1) s2 = (s2 + 1) % pool.length;

  const choices = [
    {reading: v.reading, ja: v.ja, correct: true},
    {reading: pool[s1].reading, ja: pool[s1].ja, correct: false},
    {reading: pool[s2].reading, ja: pool[s2].ja, correct: false},
  ];

  // seeded shuffle
  let s = v.id;
  for(let i = choices.length - 1; i > 0; i--){
    s = (s * 1103515245 + 12345) & 0x7fffffff;
    const j = s % (i + 1);
    [choices[i], choices[j]] = [choices[j], choices[i]];
  }
  return choices;
}

// ─── TTS ──────────────────────────────────────────────────────────────────────
function speak(text, btnEl){
  if(currentAudio){ currentAudio.pause(); currentAudio = null; }
  document.querySelectorAll('.tts-btn.playing').forEach(b => b.classList.remove('playing'));
  if(btnEl) btnEl.classList.add('playing');
  const url = 'https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=ja&client=gtx&q=' + encodeURIComponent(text);
  const audio = new Audio(url);
  audio.playbackRate = 0.9;
  currentAudio = audio;
  audio.onended = () => { if(btnEl) btnEl.classList.remove('playing'); currentAudio = null; };
  audio.onerror = () => {
    if(btnEl) btnEl.classList.remove('playing');
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'ja-JP'; utt.rate = 0.85;
    speechSynthesis.speak(utt);
  };
  audio.play().catch(() => audio.onerror && audio.onerror());
}

// ─── FILTER & RENDER ──────────────────────────────────────────────────────────
const cats = ['전체', ...new Set(VOCAB.map(v => v.cat))];
const statuses = ['전체', '미답변', '틀린것만', '맞은것', '완료(⭐)'];

function getStatus(v){
  const s = state[v.id];
  if(!s) return 'none';
  if(s.mastered) return 'mastered';
  if(s.correct === true) return 'correct';
  if(s.correct === false) return 'wrong';
  return 'none';
}

function filteredVocab(){
  return VOCAB.filter(v => {
    const catOk = activeCat === '전체' || v.cat === activeCat;
    const st = getStatus(v);
    const statusOk =
      activeStatus === '전체' ? true :
      activeStatus === '미답변' ? st === 'none' :
      activeStatus === '틀린것만' ? st === 'wrong' :
      activeStatus === '맞은것' ? st === 'correct' :
      activeStatus === '완료(⭐)' ? st === 'mastered' : true;
    return catOk && statusOk;
  });
}

function renderFilters(){
  const cf = document.getElementById('catFilters');
  cf.innerHTML = cats.map(c =>
    `<button class="filter-btn${activeCat===c?' active':''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
  const sf = document.getElementById('statusFilters');
  sf.innerHTML = statuses.map(s =>
    `<button class="status-btn${activeStatus===s?' active':''}" onclick="setStatus('${s}')">${s}</button>`
  ).join('');
}

function setCat(c){ activeCat = c; render(); }
function setStatus(s){ activeStatus = s; render(); }

function renderStats(){
  const total = VOCAB.length;
  const done = VOCAB.filter(v => {const s=state[v.id]; return s&&(s.correct===true||s.mastered);}).length;
  const wrong = VOCAB.filter(v => {const s=state[v.id]; return s&&s.correct===false&&!s.mastered;}).length;
  const mastered = VOCAB.filter(v => {const s=state[v.id]; return s&&s.mastered;}).length;

  document.getElementById('progBar').style.width = (done/total*100)+'%';
  document.getElementById('progLabel').textContent = `${done} / ${total} 완료`;
  document.getElementById('stats').innerHTML =
    `<span>전체 <b>${total}</b></span><span>완료 <b>${done}</b></span><span>틀림 <b>${wrong}</b></span><span>⭐ <b>${mastered}</b></span>`;
}

function renderCards(){
  const list = filteredVocab();
  const el = document.getElementById('cardList');
  if(!list.length){ el.innerHTML = '<div class="empty">해당하는 단어가 없습니다</div>'; return; }

  el.innerHTML = list.map((v, idx) => {
    const s = state[v.id] || {};
    const choices = buildChoices(v);
    const answered = s.correct !== undefined;
    const statusCls = s.mastered ? ' mastered' : s.correct === true ? ' correct' : s.correct === false ? ' wrong' : '';

    const choiceBtns = choices.map(c => {
      let cls = '';
      if(answered){
        if(c.correct) cls = 'show-correct';
        else if(!c.correct && s.chosenReading === c.reading) cls = 'wrong-ans';
      }
      return `<button class="choice-btn ${cls}" ${answered?'disabled':''} onclick="answer(${v.id},'${c.reading}',${c.correct},this)">
        ${c.reading}<span class="choice-reading">${c.ja}</span>
      </button>`;
    }).join('');

    const answerShow = answered ? ' show' : '';

    return `<div class="card${statusCls}" id="card-${v.id}">
      <div class="card-header">
        <span class="card-num">${idx+1}</span>
        <span class="card-cat">${v.cat}</span>
        <button class="master-btn" onclick="toggleMaster(${v.id})">${s.mastered?'⭐':'☆'}</button>
      </div>
      <div class="card-word">${v.kr}</div>
      <div class="card-word-sub">일본어 발음을 고르세요</div>
      <div class="choices">${choiceBtns}</div>
      <div class="answer-area${answerShow}" id="ans-${v.id}">
        <div class="answer-row">
          <button class="tts-btn" id="tts-${v.id}" onclick="speak('${v.reading}',this)">🔊</button>
          <span class="answer-ja">${v.ja}（${v.reading}）</span>
          <span class="answer-kr">${v.kr}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function render(){
  renderFilters();
  renderStats();
  renderCards();
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function answer(id, reading, isCorrect, btnEl){
  const v = VOCAB.find(x => x.id === id);
  if(!v) return;
  state[id] = { correct: isCorrect, chosenReading: reading, mastered: state[id]?.mastered || false };
  saveState();

  const card = document.getElementById('card-'+id);
  if(card){
    card.classList.remove('correct','wrong');
    card.classList.add(isCorrect ? 'correct' : 'wrong');
    card.querySelectorAll('.choice-btn').forEach(b => {
      b.disabled = true;
      const r = b.textContent.trim().split('\n')[0].trim();
    });
    // highlight choices
    card.querySelectorAll('.choice-btn').forEach(b => {
      const bReading = b.querySelector('.choice-reading')?.previousSibling?.textContent?.trim();
    });
    // re-render choices properly
    const choices = buildChoices(v);
    card.querySelectorAll('.choice-btn').forEach((b, i) => {
      const c = choices[i];
      b.disabled = true;
      if(c.correct) b.className = 'choice-btn show-correct';
      else if(c.reading === reading && !isCorrect) b.className = 'choice-btn wrong-ans';
      else b.className = 'choice-btn';
    });

    const ansEl = document.getElementById('ans-'+id);
    if(ansEl) ansEl.classList.add('show');
  }

  setTimeout(() => {
    const btn = document.getElementById('tts-'+id);
    if(btn) speak(v.reading, btn);
  }, 300);

  renderStats();
}

function toggleMaster(id){
  if(!state[id]) state[id] = { correct: undefined, mastered: false };
  state[id].mastered = !state[id].mastered;
  saveState();
  render();
}

function resetAll(){
  if(!confirm('모든 진행 상태를 초기화할까요?')) return;
  state = {};
  saveState();
  render();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadState(); render(); // initial render from localStorage
_ref3.on('value', snap=>{
  const d=snap.val();
  if(d){ state=d; render(); }
}, ()=>{});
</script>
