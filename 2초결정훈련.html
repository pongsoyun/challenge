<html lang="ko">
<head>
<meta charset="UTF-8">

<title>⚡ 2초 결정 훈련 🇯🇵</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic','Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}

/* HEADER */
header{background:#1a1a2e;color:#fff;padding:14px 16px 10px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.3)}
h1{font-size:1.1rem;font-weight:700;margin-bottom:8px;letter-spacing:-.3px}
.progress-bar{height:5px;background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;background:#4ade80;border-radius:3px;transition:width .4s ease}
.stats{display:flex;gap:10px;font-size:.72rem;color:rgba(255,255,255,.7)}

/* FILTER */
.filter-bar{display:flex;gap:6px;padding:10px 16px;background:#fff;border-bottom:1px solid #e8eaf0;overflow-x:auto;position:sticky;top:72px;z-index:199;-ms-overflow-style:none;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.f-btn{padding:6px 14px;border:1.5px solid #dde0e8;border-radius:20px;background:#fff;font-size:.78rem;color:#555;cursor:pointer;white-space:nowrap;font-weight:500;transition:all .15s}
.f-btn.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}

/* CATEGORY LABEL */
.cat-label{font-size:.7rem;font-weight:700;color:#6c757d;text-transform:uppercase;letter-spacing:.5px;padding:16px 16px 6px;display:none}
.cat-label.show{display:block}

/* CARDS */
.cards{padding:8px 16px 80px;display:flex;flex-direction:column;gap:10px}
.card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:4px solid #e0e4ed;transition:border-color .2s,opacity .2s}
.card.answered-correct{border-left-color:#4ade80}
.card.answered-wrong{border-left-color:#f87171}
.card.mastered{opacity:.45}
.card.hidden{display:none}

/* CARD HEADER */
.card-top{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.num{font-size:.7rem;color:#aaa;min-width:24px;font-weight:600}
.sit{font-size:.98rem;font-weight:700;flex:1;line-height:1.3}
.chk{width:24px;height:24px;border:2px solid #dde0e8;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;font-size:13px}
.chk.on{background:#4ade80;border-color:#4ade80;color:#fff}

/* CHOICES */
.choices{display:flex;gap:7px;flex-wrap:wrap}
.c-btn{flex:1;min-width:90px;padding:11px 6px;border:2px solid #e0e4ed;border-radius:10px;background:#fafbff;font-size:.88rem;cursor:pointer;text-align:center;line-height:1.4;transition:all .15s;font-family:inherit;font-weight:500;word-break:break-all}
.c-btn:active{transform:scale(.96)}
.c-btn.s-correct{background:#dcfce7;border-color:#4ade80;color:#166534}
.c-btn.s-wrong{background:#fee2e2;border-color:#f87171;color:#991b1b}
.c-btn.show-ans{background:#dcfce7;border-color:#4ade80;color:#166534}
.c-btn.disabled{pointer-events:none;opacity:.6}

/* ANSWER BOX */
.ans-box{margin-top:10px;padding:11px 12px;background:#f8f9ff;border-radius:9px;display:none;animation:fadeIn .2s ease}
.ans-box.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.ans-word{font-size:1rem;font-weight:800;color:#1a1a2e;margin-bottom:3px}
.ans-hint{font-size:.8rem;color:#5a5f7d;margin-bottom:5px;line-height:1.4}
.ans-ex{font-size:.9rem;color:#1a1a2e;font-weight:600}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:#fff;border-top:1px solid #e8eaf0;display:flex;gap:8px;z-index:199}
.reset-btn{flex:1;padding:12px;background:#f0f2f5;color:#555;border:none;border-radius:10px;font-size:.88rem;font-weight:600;cursor:pointer;font-family:inherit}
.wrong-btn{flex:1;padding:12px;background:#1a1a2e;color:#fff;border:none;border-radius:10px;font-size:.88rem;font-weight:600;cursor:pointer;font-family:inherit}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 20px;color:#aaa;font-size:.9rem}

/* TTS */
.tts-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;padding:2px 4px;border-radius:6px;transition:transform .15s;vertical-align:middle;line-height:1}
.tts-btn:active{transform:scale(.85)}
.tts-btn.playing{animation:pulse .6s infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.4}}
</style>

<header>

  <div class="stats">
    <span id="sTot">0/110</span>
    <span id="sOk">✅ 0</span>
    <span id="sNg">❌ 0</span>
    <span id="sMt">⭐ 0</span>
  </div>
</header>

<div class="filter-bar">
  <button class="f-btn active" onclick="setFilter('all',this)">전체</button>
  <button class="f-btn" onclick="setFilter('unanswered',this)">미답변</button>
  <button class="f-btn" onclick="setFilter('wrong',this)">틀린것만 ❌</button>
  <button class="f-btn" onclick="setFilter('correct',this)">맞은것 ✅</button>
  <button class="f-btn" onclick="setFilter('mastered',this)">완료 ⭐</button>
</div>

<div class="cards" id="cards"></div>

<div class="bottom-bar">
  <button class="reset-btn" onclick="resetAll()">🔄 초기화</button>
  <button class="wrong-btn" onclick="showWrongOnly()">❌ 틀린것만</button>
</div>

// ── TTS ──────────────────────────────────────────────────────────
let currentAudio = null;

function stripFurigana(text){
  return text.replace(/\([ぁ-んァ-ン]+\)/g, '');
}

function speak(rawText, btnEl){
  const text = stripFurigana(rawText);

  // stop previous
  if(currentAudio){
    currentAudio.pause();
    currentAudio = null;
  }
  document.querySelectorAll('.tts-btn.playing').forEach(b => b.classList.remove('playing'));

  if(btnEl) btnEl.classList.add('playing');

  // Google Translate TTS (자연스러운 목소리)
  const url = 'https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=ja&client=gtx&q=' + encodeURIComponent(text);
  const audio = new Audio(url);
  audio.playbackRate = 0.95;
  currentAudio = audio;
  audio.onended = () => { if(btnEl) btnEl.classList.remove('playing'); currentAudio = null; };
  audio.onerror = () => {
    // fallback: Web Speech API
    if(btnEl) btnEl.classList.remove('playing');
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'ja-JP'; utt.rate = 0.85;
    speechSynthesis.speak(utt);
  };
  audio.play().catch(() => audio.onerror());
}

// ── RENDER ───────────────────────────────────────────────────────
function render(){
  const wrap = document.getElementById('cards');
  wrap.innerHTML = '';

  let lastCat = null;
  let visibleCount = 0;

  Q.forEach(q => {
    const s = state[q.n] || {};
    const isAnswered = s.pick !== undefined;
    const isCorrect = isAnswered && s.pick === q.a;
    const isWrong = isAnswered && s.pick !== q.a;
    const isMastered = !!s.mastered;

    let show = true;
    if(currentFilter === 'unanswered') show = !isAnswered;
    else if(currentFilter === 'wrong') show = isWrong;
    else if(currentFilter === 'correct') show = isCorrect;
    else if(currentFilter === 'mastered') show = isMastered;

    if(!show) return;
    visibleCount++;

    // category label
    if(q.cat !== lastCat){
      const lbl = document.createElement('div');
      lbl.className = 'cat-label show';
      lbl.textContent = q.cat;
      wrap.appendChild(lbl);
      lastCat = q.cat;
    }

    // card
    const card = document.createElement('div');
    card.className = 'card' +
      (isMastered ? ' mastered' : '') +
      (isCorrect ? ' answered-correct' : '') +
      (isWrong ? ' answered-wrong' : '');
    card.id = 'card-' + q.n;

    // top row
    const top = document.createElement('div');
    top.className = 'card-top';

    const num = document.createElement('span');
    num.className = 'num';
    num.textContent = q.n;

    const sit = document.createElement('span');
    sit.className = 'sit';
    sit.textContent = q.sit;

    const chk = document.createElement('div');
    chk.className = 'chk' + (isMastered ? ' on' : '');
    chk.textContent = isMastered ? '⭐' : '';
    chk.onclick = () => toggleMaster(q.n);

    top.appendChild(num);
    top.appendChild(sit);
    top.appendChild(chk);

    // choices
    const choices = document.createElement('div');
    choices.className = 'choices';

    q.c.forEach((label, i) => {
      const btn = document.createElement('button');
      btn.className = 'c-btn';
      btn.textContent = label;

      if(isAnswered){
        btn.classList.add('disabled');
        if(i === q.a) btn.classList.add('show-ans');
        if(i === s.pick && s.pick !== q.a) btn.classList.add('s-wrong');
      } else {
        btn.onclick = () => answer(q.n, i);
      }
      choices.appendChild(btn);
    });

    // answer box
    const ansBox = document.createElement('div');
    ansBox.className = 'ans-box' + (isAnswered ? ' show' : '');
    if(isAnswered){
      const emoji = isCorrect ? '✅' : '❌';
      const word = document.createElement('div');
      word.className = 'ans-word';
      word.textContent = emoji + ' ' + q.c[q.a];
      const hint = document.createElement('div');
      hint.className = 'ans-hint';
      hint.textContent = '👉 ' + q.h;
      const exRow = document.createElement('div');
      exRow.style.display = 'flex';
      exRow.style.alignItems = 'center';
      exRow.style.gap = '6px';
      const ex = document.createElement('span');
      ex.className = 'ans-ex';
      ex.textContent = '예) ' + q.ex;
      const ttsBtn = document.createElement('button');
      ttsBtn.className = 'tts-btn';
      ttsBtn.textContent = '🔊';
      ttsBtn.title = '소리 듣기';
      ttsBtn.onclick = (e) => { e.stopPropagation(); speak(q.ex, ttsBtn); };
      exRow.appendChild(ex);
      exRow.appendChild(ttsBtn);
      ansBox.appendChild(word);
      ansBox.appendChild(hint);
      ansBox.appendChild(exRow);
    }

    card.appendChild(top);
    card.appendChild(choices);
    card.appendChild(ansBox);
    wrap.appendChild(card);
  });

  if(visibleCount === 0){
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = '해당하는 문제가 없습니다 😊';
    wrap.appendChild(empty);
  }

  updateStats();
}

// ── ANSWER ───────────────────────────────────────────────────────
function answer(n, pick){
  if(!state[n]) state[n] = {};
  state[n].pick = pick;
  saveState();

  const q = Q.find(x => x.n === n);
  const card = document.getElementById('card-' + n);
  const isCorrect = pick === q.a;

  card.className = 'card ' + (isCorrect ? 'answered-correct' : 'answered-wrong');

  // update buttons
  const btns = card.querySelectorAll('.c-btn');
  btns.forEach((b,i) => {
    b.classList.add('disabled');
    if(i === q.a) b.classList.add('show-ans');
    if(i === pick && pick !== q.a) b.classList.add('s-wrong');
    b.onclick = null;
  });

  // show answer box
  const ansBox = card.querySelector('.ans-box');
  const emoji = isCorrect ? '✅' : '❌';
  ansBox.innerHTML =
    '<div class="ans-word">'+emoji+' '+q.c[q.a]+'</div>'+
    '<div class="ans-hint">👉 '+q.h+'</div>'+
    '<div style="display:flex;align-items:center;gap:6px">'+
      '<span class="ans-ex">예) '+q.ex+'</span>'+
      '<button class="tts-btn" id="tts-'+q.n+'" title="소리 듣기">🔊</button>'+
    '</div>';
  ansBox.classList.add('show');

  // auto-play after short delay
  setTimeout(() => {
    const btn = document.getElementById('tts-'+q.n);
    if(btn) speak(q.ex, btn);
  }, 300);
  // wire up button
  const ttsBtn = document.getElementById('tts-'+q.n);
  if(ttsBtn) ttsBtn.onclick = (e) => { e.stopPropagation(); speak(q.ex, ttsBtn); };

  updateStats();
}

// ── MASTER TOGGLE ────────────────────────────────────────────────
function toggleMaster(n){
  if(!state[n]) state[n] = {};
  state[n].mastered = !state[n].mastered;
  saveState();
  render();
}

// ── FILTER ───────────────────────────────────────────────────────
function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  render();
}

function showWrongOnly(){
  currentFilter = 'wrong';
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── STATS ────────────────────────────────────────────────────────
function updateStats(){
  let answered=0, correct=0, wrong=0, mastered=0;
  Q.forEach(q => {
    const s = state[q.n]||{};
    if(s.pick !== undefined){ answered++; (s.pick===q.a ? correct++ : wrong++); }
    if(s.mastered) mastered++;
  });
  document.getElementById('sTot').textContent = answered+'/'+TOTAL;
  document.getElementById('sOk').textContent = '✅ '+correct;
  document.getElementById('sNg').textContent = '❌ '+wrong;
  document.getElementById('sMt').textContent = '⭐ '+mastered;
  document.getElementById('pFill').style.width = (answered/TOTAL*100).toFixed(1)+'%';
}

// ── RESET ────────────────────────────────────────────────────────
function resetAll(){
  if(!confirm('전체 초기화하시겠어요?')) return;
  state = {};
  saveState();
  currentFilter = 'all';
  document.querySelectorAll('.f-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}
